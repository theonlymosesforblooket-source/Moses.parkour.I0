<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Elmo Parkour - Beta Build</title>
  <style>
    body { margin:0; overflow:hidden; background:#111; font-family:sans-serif; }
    canvas { display:block; margin:0 auto; background:#222; border: 2px solid #444; }
  </style>
</head>
<body>
<canvas id="game" width="800" height="400"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let currentLevel = 1;
let player = { 
  x:50, y:300, w:20, h:40, 
  dy:0, onGround:false, 
  crouching:false, standHeight:40, crouchHeight:20 
};

const gravity = 0.6; 
const jumpPower = -13;
const moveSpeed = 5;      
const worldSpeed = 3;     

let keys = { left:false, right:false, jump:false, crouch:false, key5:false, key9:false };
let goal = { x: 730, y: 150, w: 30, h: 30 };

// Platform Data for Levels
function loadLevel(lvl) {
    player.dy = 0;
    if(lvl === 1) {
        player.x = 50; player.y = 300;
        platforms = [
          {x:0, y:380, w:200, h:10},
          {x:220, y:330, w:100, h:10},
          {x:350, y:280, w:100, h:10},
          {x:480, y:230, w:100, h:10},
          {x:610, y:180, w:150, h:10}
        ];
        goal = { x: 730, y: 150, w: 30, h: 30 };
    } else if(lvl === 2) {
        player.x = 100; player.y = 100;
        platforms = [
            {x:100, y:300, w:100, h:15},
            {x:350, y:250, w:100, h:15},
            {x:600, y:200, w:100, h:15}
        ];
        goal = { x: 750, y: 150, w: 30, h: 30 };
    }
}

let platforms = [];
loadLevel(1); // Start at level 1

function nextLevel() {
    if(currentLevel < 2) {
        currentLevel++;
        loadLevel(currentLevel);
    } else {
        alert("End of Beta!");
        currentLevel = 1;
        loadLevel(1);
    }
}

function prevLevel() {
    if(currentLevel > 1) {
        currentLevel--;
        loadLevel(currentLevel);
    }
}

function drawElmo(x, y, w, h) {
  ctx.fillStyle = '#e01b22';
  ctx.beginPath(); ctx.ellipse(x + w/2, y - h/2, w * 0.8, h/2, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(x + w/4, y - h + 5, h/5, 0, Math.PI * 2); ctx.arc(x + 3*w/4, y - h + 5, h/5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'black';
  ctx.beginPath(); ctx.arc(x + w/4, y - h + 5, h/12, 0, Math.PI * 2); ctx.arc(x + 3*w/4, y - h + 5, h/12, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ff9900';
  ctx.beginPath(); ctx.ellipse(x + w/2, y - h/1.8, w/4, h/6, 0, 0, Math.PI * 2); ctx.fill();
}

function update() {
  if (currentLevel === 1) {
    if(keys.left) player.x -= moveSpeed;
    if(keys.right) player.x += moveSpeed;
    if(keys.jump && player.onGround) player.dy = jumpPower;
  } else {
    if(keys.right) { player.x += worldSpeed; platforms.forEach(p => p.y -= worldSpeed); goal.y -= worldSpeed; }
    if(keys.left) { player.x -= worldSpeed; platforms.forEach(p => p.y += worldSpeed); goal.y += worldSpeed; }
    if(keys.jump) { if(player.onGround) player.dy = jumpPower; platforms.forEach(p => p.x -= worldSpeed); goal.x -= worldSpeed; }
    if(keys.crouch) { platforms.forEach(p => p.x += worldSpeed); goal.x += worldSpeed; }
  }

  player.dy += gravity;
  player.y += player.dy;

  player.onGround = false;
  platforms.forEach(p => {
    let range = Math.abs(player.dy) + 5;
    if (player.x + player.w > p.x && player.x < p.x + p.w) {
      if (player.y >= p.y && player.y - range <= p.y) {
        player.y = p.y;
        player.dy = 0;
        player.onGround = true;
      }
    }
  });

  if (player.y > canvas.height + 200 || player.y < -200) {
      loadLevel(currentLevel);
  }

  let h = player.crouching ? player.crouchHeight : player.standHeight;
  if (player.x < goal.x + goal.w && player.x + player.w > goal.x &&
      player.y - h < goal.y + goal.h && player.y > goal.y) {
      nextLevel();
  }

  draw();
  requestAnimationFrame(update);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "white";
  ctx.font = "16px Arial";
  ctx.fillText("Level: " + currentLevel, 20, 30);
  ctx.fillText("BETA: 5+D (Next) | 9+A (Prev)", 20, 55);
  
  ctx.fillStyle = "gold";
  ctx.fillRect(goal.x, goal.y, goal.w, goal.h);
  ctx.fillStyle = '#666';
  platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

  let h = player.crouching ? player.crouchHeight : player.standHeight;
  drawElmo(player.x, player.y, player.w, h);
}

document.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();
  if(key === '2') keys.left = true;
  if(key === 'enter') keys.right = true;
  if(key === 'h') keys.jump = true;
  if(key === 'shift') { keys.crouch = true; player.crouching = true; }
  
  // Beta Combo Logic
  if(key === '5') keys.key5 = true;
  if(key === '9') keys.key9 = true;
  
  if(keys.key5 && key === 'd') nextLevel();
  if(keys.key9 && key === 'a') prevLevel();
});

document.addEventListener('keyup', e => {
  const key = e.key.toLowerCase();
  if(key === '2') keys.left = false;
  if(key === 'enter') keys.right = false;
  if(key === 'h') keys.jump = false;
  if(key === 'shift') { keys.crouch = false; player.crouching = false; }
  
  if(key === '5') keys.key5 = false;
  if(key === '9') keys.key9 = false;
});

update();
</script>
</body>
</html>
